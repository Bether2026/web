<nav class="nav" id="nav"></nav>

<main>

<section class="page-hero">
  <div class="section__inner">
    <div class="sec-tag rv">Contacto</div>
    <h1 class="sec-title rv">¿Listo para crear la <em>experiencia?</em></h1>
    <p class="sec-sub rv">Contanos tu idea. En menos de 24 hs tenés una propuesta. Sin compromiso.</p>
  </div>
</section>

<section class="section" style="padding-top:0">
  <div class="section__inner">
    <div class="contacto-layout">

      <!-- Canales directos -->
      <div class="rv" data-rv="left">
        <div class="contacto-directos" id="contactoDirectos"></div>
        <div class="contacto-nota rv">
          <span class="contacto-nota__dot"></span>
          Respondemos en menos de 24 hs
        </div>
      </div>

      <!-- Formulario -->
      <div class="card contacto-form-card rv" data-rv="right">
        <div class="contacto-form-title">Contanos la idea</div>
        <p class="contacto-form-sub">Cuanto más nos cuentes, mejor la propuesta. Pero no es obligatorio llenar todo.</p>
        <div class="form" id="contactForm"></div>
      </div>

    </div>
  </div>
</section>
